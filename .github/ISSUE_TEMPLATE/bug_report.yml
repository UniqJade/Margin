name: Bug report
description: Report a reproducible problem in the source build.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Margin is a source-only personal project. Do not include API keys,
        signing files, private book excerpts, provider response bodies, or a
        populated `Local.xcconfig`.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - iPhone
        - iPad
        - Evaluation tool
        - Build or repository tooling
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Version information
      description: Margin commit/tag, OS version, Xcode version, and Apple Books version when relevant.
      placeholder: "Margin v0.1.0; macOS 26.x; Xcode 26.x; Books 8.x"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use harmless self-authored sample text instead of copyrighted book text.
      placeholder: |
        1. Build...
        2. Select the sample text...
        3. Press...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Public-data check
      options:
        - label: I removed credentials, personal signing values, private book text, and raw provider responses.
          required: true
